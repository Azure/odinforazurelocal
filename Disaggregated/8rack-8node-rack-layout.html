<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disaggregated Rack Layout — 8 Racks × 8 Nodes (64 Total), FC SAN</title>
    <style>
        body {
            background: #111;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
        #diagram { max-width: 100%; overflow-x: auto; }
        button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #2a2a2a; }
    </style>
</head>
<body>
    <h1>Disaggregated Azure Local — Rack Layout (Power-Constrained)</h1>
    <p class="subtitle">1 Cluster × 8 Racks × 8 Nodes = 64 Nodes | FC SAN Storage | 2 Spines | Clos Leaf-Spine Fabric</p>
    <div id="diagram"></div>
    <button onclick="downloadSvg()">Download Rack Diagram SVG</button>

<script>
(function () {
    'use strict';

    // ── Smaller layout constants for 8-rack horizontal fit ──
    var TOTAL_U = 42;
    var RACK_W = 148;
    var U_H = 10;
    var POST_W = 6;
    var RACK_GAP = 14;
    var LABEL_FONT = 7.5;
    var LEGEND_FONT = 8;

    var C = {
        RACK_FRAME:  '#2a2a2a',
        RACK_RAIL:   '#3a3a3a',
        EMPTY_SLOT:  '#1a1a1a',
        SERVER:      '#aaaaaa',
        LEAF_SWITCH: '#444444',
        BMC_SWITCH:  '#e0e0e0',
        FC_SWITCH:   '#7c3aed',
        SAN_ARRAY:   '#6d28d9',
        SPINE:       '#1a6fc4',
        SERVICE_LEAF:'#0d9488',
        LABEL_LIGHT: '#ffffff',
        LABEL_DARK:  '#333333',
        BACKGROUND:  '#0a0a0a'
    };

    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Draw a rack frame ──
    function drawRackFrame(ox, oy, rackLabel) {
        var innerH = TOTAL_U * U_H;
        var outerW = RACK_W + POST_W * 2;
        var outerH = innerH + 12;
        var parts = [];
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + outerW + '" height="' + outerH + '" rx="3" fill="' + C.RACK_FRAME + '" stroke="#555" stroke-width="0.5"/>');
        parts.push('<rect x="' + (ox + POST_W) + '" y="' + (oy + 6) + '" width="' + RACK_W + '" height="' + innerH + '" fill="' + C.EMPTY_SLOT + '"/>');
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + POST_W + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        parts.push('<rect x="' + (ox + POST_W + RACK_W) + '" y="' + oy + '" width="' + POST_W + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        if (rackLabel) {
            parts.push('<text x="' + (ox + outerW / 2) + '" y="' + (oy - 5) + '" text-anchor="middle" font-size="' + (LABEL_FONT + 1) + '" font-weight="600" fill="#ccc" font-family="Segoe UI, sans-serif">' + esc(rackLabel) + '</text>');
        }
        return parts.join('\n');
    }

    // ── Draw a device at a U position ──
    function drawDevice(ox, oy, uStart, heightU, color, label, labelColor, isLight) {
        var innerH = TOTAL_U * U_H;
        var deviceW = RACK_W - 4;
        var deviceH = heightU * U_H - 2;
        var dx = ox + POST_W + 2;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var parts = [];
        parts.push('<rect x="' + dx + '" y="' + dy + '" width="' + deviceW + '" height="' + deviceH + '" rx="2" fill="' + color + '"/>');
        var panelOpacity = isLight ? '0.15' : '0.5';
        parts.push('<rect x="' + (dx + 2) + '" y="' + (dy + 1) + '" width="' + (deviceW - 4) + '" height="' + (deviceH - 2) + '" rx="1" fill="#0d0d0d" opacity="' + panelOpacity + '"/>');
        if (label) {
            var lc = labelColor || C.LABEL_LIGHT;
            var fs = Math.min(LABEL_FONT, deviceH * 0.7);
            var ly = dy + deviceH / 2 + fs * 0.35;
            parts.push('<text x="' + (dx + deviceW / 2) + '" y="' + ly + '" text-anchor="middle" font-size="' + fs + '" font-weight="500" fill="' + lc + '" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        return parts.join('\n');
    }

    // ── Draw a 1U switch with LEDs ──
    function drawSwitch(ox, oy, uStart, label, color, labelColor, isLight) {
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 1, color, label, labelColor || C.LABEL_LIGHT, isLight));
        var innerH = TOTAL_U * U_H;
        var dx = ox + POST_W + 2;
        var deviceW = RACK_W - 4;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var deviceH = U_H - 2;
        var ledX = dx + deviceW - 10;
        var ledY = dy + deviceH / 2;
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (ledX + i * 3) + '" cy="' + ledY + '" r="1" fill="#00ff66" opacity="0.6"/>');
        }
        return parts.join('\n');
    }

    // ── Draw a 2U server node ──
    function drawServer(ox, oy, uStart, label) {
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 2, C.SERVER, label, C.LABEL_LIGHT));
        var innerH = TOTAL_U * U_H;
        var dx = ox + POST_W + 2;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var deviceH = 2 * U_H - 2;
        var deviceW = RACK_W - 4;
        // Drive bays
        var bayW = 5;
        var bayH = deviceH * 0.35;
        var bayY = dy + deviceH / 2 - bayH / 2;
        var bayStartX = dx + 4;
        for (var b = 0; b < 6; b++) {
            parts.push('<rect x="' + (bayStartX + b * (bayW + 1)) + '" y="' + bayY + '" width="' + bayW + '" height="' + bayH + '" rx="0.5" fill="#333" opacity="0.4"/>');
        }
        // LEDs
        var ledX = dx + deviceW - 10;
        var ledY = dy + 3;
        parts.push('<circle cx="' + ledX + '" cy="' + ledY + '" r="1.2" fill="#00ff66" opacity="0.7"/>');
        parts.push('<circle cx="' + (ledX + 4) + '" cy="' + ledY + '" r="1.2" fill="#3399ff" opacity="0.7"/>');
        return parts.join('\n');
    }

    // ── Draw a standalone box (spine, service leaf, SAN) ──
    function drawStandaloneBox(x, y, w, h, color, strokeColor, label, sublabel) {
        var parts = [];
        parts.push('<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" rx="4" fill="' + color + '" stroke="' + strokeColor + '" stroke-width="0.5"/>');
        parts.push('<rect x="' + (x + 3) + '" y="' + (y + 2) + '" width="' + (w - 6) + '" height="' + (h - 4) + '" rx="2" fill="#0d0d0d" opacity="0.4"/>');
        if (label) {
            var ly = sublabel ? (y + h / 2 - 2) : (y + h / 2 + 3);
            parts.push('<text x="' + (x + w / 2) + '" y="' + ly + '" text-anchor="middle" font-size="8" font-weight="500" fill="#ffffff" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        if (sublabel) {
            parts.push('<text x="' + (x + w / 2) + '" y="' + (y + h / 2 + 8) + '" text-anchor="middle" font-size="6.5" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(sublabel) + '</text>');
        }
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (x + w - 10 + i * 4) + '" cy="' + (y + 6) + '" r="1.2" fill="#00ff66" opacity="0.7"/>');
        }
        return parts.join('\n');
    }

    // ── Main generator ──
    function generate() {
        var rackCount = 8;
        var nodesPerRack = 8;
        var spineCount = 2;

        var outerRackW = RACK_W + POST_W * 2;
        var innerH = TOTAL_U * U_H;
        var outerRackH = innerH + 12;

        var paddingX = 24;
        var titleH = 28;
        var spineH = 30;
        var spineGap = 14;
        var slH = 26;
        var slGap = 12;
        var rackLabelGap = 20;
        var sanH = 40;
        var sanGap = 16;
        var legendH = 50;

        var totalRackWidth = rackCount * outerRackW + (rackCount - 1) * RACK_GAP;
        var svgW = totalRackWidth + paddingX * 2;
        var rackTopY = titleH + spineH + spineGap + slH + slGap + rackLabelGap;
        var svgH = rackTopY + outerRackH + sanGap + sanH + 10 + legendH;

        var parts = [];
        parts.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + svgW + ' ' + svgH + '" width="' + svgW + '" height="' + svgH + '" style="font-family: \'Segoe UI\', sans-serif;">');
        parts.push('<rect width="' + svgW + '" height="' + svgH + '" fill="' + C.BACKGROUND + '" rx="6"/>');

        // ── Title ──
        parts.push('<text x="' + (svgW / 2) + '" y="18" text-anchor="middle" font-size="11" font-weight="600" fill="#ccc">Rack Layout — Front View (Disaggregated, FC SAN, 8 Nodes/Rack — Power Constrained)</text>');

        // ── Spines ──
        var spineY = titleH;
        var spineW = 160;
        var spineGapBetween = 30;
        var spineGroupW = spineCount * spineW + (spineCount - 1) * spineGapBetween;
        var spineStartX = (svgW - spineGroupW) / 2;
        for (var s = 0; s < spineCount; s++) {
            var sx = spineStartX + s * (spineW + spineGapBetween);
            parts.push(drawStandaloneBox(sx, spineY, spineW, spineH, C.SPINE, '#2a8ad4', 'Spine ' + (s + 1), 'ASN 64841'));
        }

        // ── Service Leaves ──
        var slY = spineY + spineH + spineGap;
        var slW = 140;
        var slGroupW = 2 * slW + 20;
        var slStartX = (svgW - slGroupW) / 2;
        parts.push(drawStandaloneBox(slStartX, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf A', 'ASN 65005'));
        parts.push(drawStandaloneBox(slStartX + slW + 20, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf B', 'ASN 65005'));

        // Spine to Service Leaf lines
        for (var si = 0; si < spineCount; si++) {
            var spineCX = spineStartX + si * (spineW + spineGapBetween) + spineW / 2;
            for (var sli = 0; sli < 2; sli++) {
                var slCX = slStartX + sli * (slW + 20) + slW / 2;
                parts.push('<line x1="' + spineCX + '" y1="' + (spineY + spineH) + '" x2="' + slCX + '" y2="' + slY + '" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            }
        }

        // ── Racks ──
        var rackBaseASN = 64789;
        var nodeGlobal = 0;

        for (var r = 0; r < rackCount; r++) {
            var ox = paddingX + r * (outerRackW + RACK_GAP);
            var oy = rackTopY;
            var rackASN = rackBaseASN + r;

            parts.push(drawRackFrame(ox, oy, 'Rack ' + (r + 1) + ' (ASN ' + rackASN + ')'));

            // ── Uplink lines from spines ──
            var leafAX = ox + outerRackW * 0.35;
            var leafBX = ox + outerRackW * 0.65;
            for (var si2 = 0; si2 < spineCount; si2++) {
                var spineCX2 = spineStartX + si2 * (spineW + spineGapBetween) + spineW / 2;
                parts.push('<line x1="' + spineCX2 + '" y1="' + (slY + slH) + '" x2="' + leafAX + '" y2="' + oy + '" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
                parts.push('<line x1="' + spineCX2 + '" y1="' + (slY + slH) + '" x2="' + leafBX + '" y2="' + oy + '" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            }

            // ── Devices ──
            var leafNum = r * 2;
            // U42: Leaf-A
            parts.push(drawSwitch(ox, oy, 42, 'Leaf ' + (leafNum + 1) + 'A', C.LEAF_SWITCH));
            // U41: Leaf-B
            parts.push(drawSwitch(ox, oy, 41, 'Leaf ' + (leafNum + 2) + 'B', C.LEAF_SWITCH));
            // U40: BMC
            parts.push(drawSwitch(ox, oy, 40, 'BMC ' + (r + 1), C.BMC_SWITCH, C.LABEL_DARK, true));
            // FC Switches at bottom
            parts.push(drawSwitch(ox, oy, 2, 'FC Switch ' + (r + 1) + 'A', C.FC_SWITCH));
            parts.push(drawSwitch(ox, oy, 1, 'FC Switch ' + (r + 1) + 'B', C.FC_SWITCH));

            // ── 8 Server nodes: U39 down (2U each) → U39 to U24 ──
            for (var n = 0; n < nodesPerRack; n++) {
                var serverStartU = 39 - (n * 2);
                nodeGlobal++;
                parts.push(drawServer(ox, oy, serverStartU, 'Node ' + nodeGlobal));
            }
        }

        // ── SAN Storage Arrays ──
        var sanY = rackTopY + outerRackH + sanGap;
        var sanW = (totalRackWidth - 30) / 2;
        var sanStartX = paddingX + 8;

        parts.push(drawStandaloneBox(sanStartX, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric A', 'FC 32G / Connected to FC Switch A in each rack'));
        parts.push(drawStandaloneBox(sanStartX + sanW + 14, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric B', 'FC 32G / Connected to FC Switch B in each rack'));

        // FC lines from racks to SAN
        var sanAcx = sanStartX + sanW / 2;
        var sanBcx = sanStartX + sanW + 14 + sanW / 2;
        for (var r2 = 0; r2 < rackCount; r2++) {
            var rox = paddingX + r2 * (outerRackW + RACK_GAP) + outerRackW / 2;
            parts.push('<line x1="' + rox + '" y1="' + (rackTopY + outerRackH) + '" x2="' + sanAcx + '" y2="' + sanY + '" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            parts.push('<line x1="' + rox + '" y1="' + (rackTopY + outerRackH) + '" x2="' + sanBcx + '" y2="' + sanY + '" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
        }

        // ── Legend ──
        var legendY = sanY + sanH + 18;
        var legendItems = [
            { color: C.SERVER, label: 'Server Node' },
            { color: C.LEAF_SWITCH, label: 'Leaf Switch' },
            { color: C.BMC_SWITCH, label: 'BMC Switch' },
            { color: C.FC_SWITCH, label: 'FC Switch' },
            { color: C.SPINE, label: 'Spine Switch' },
            { color: C.SERVICE_LEAF, label: 'Service Leaf' },
            { color: C.SAN_ARRAY, label: 'SAN Storage' }
        ];
        var swatchW = 10;
        var swatchH = 7;
        var itemGap = 10;
        var textWidthEstimate = function (s) { return s.length * 4.5; };
        var legendTotalW = 0;
        for (var li = 0; li < legendItems.length; li++) {
            legendTotalW += swatchW + 3 + textWidthEstimate(legendItems[li].label);
            if (li < legendItems.length - 1) legendTotalW += itemGap;
        }
        var legendX = (svgW - legendTotalW) / 2;
        for (var lj = 0; lj < legendItems.length; lj++) {
            var item = legendItems[lj];
            parts.push('<rect x="' + legendX + '" y="' + (legendY - swatchH / 2) + '" width="' + swatchW + '" height="' + swatchH + '" rx="1.5" fill="' + item.color + '" stroke="#555" stroke-width="0.5"/>');
            legendX += swatchW + 3;
            parts.push('<text x="' + legendX + '" y="' + (legendY + LEGEND_FONT * 0.35) + '" font-size="' + LEGEND_FONT + '" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(item.label) + '</text>');
            legendX += textWidthEstimate(item.label) + itemGap;
        }

        // Summary
        var switchesPerRack = 5;
        var nodesU = rackCount * nodesPerRack * 2;
        var switchesU = rackCount * switchesPerRack;
        var usedU = nodesU + switchesU;
        var totalU = TOTAL_U * rackCount;
        var emptyU = totalU - usedU;
        parts.push('<text x="' + (svgW / 2) + '" y="' + (legendY + 16) + '" text-anchor="middle" font-size="7.5" fill="#888">' + usedU + 'U used / ' + totalU + 'U total (' + emptyU + 'U available)  |  ' + nodeGlobal + ' nodes  |  ' + rackCount + ' racks  |  2 spines  |  FC SAN  |  8 nodes/rack (power constrained)</text>');

        parts.push('</svg>');
        return parts.join('\n');
    }

    // ── Render ──
    document.getElementById('diagram').innerHTML = generate();

    window.downloadSvg = function () {
        var svgEl = document.querySelector('#diagram svg');
        var blob = new Blob([svgEl.outerHTML], { type: 'image/svg+xml' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'disaggregated-rack-layout-8rack-8node-fc-san.svg';
        a.click();
        URL.revokeObjectURL(url);
    };
})();
</script>
</body>
</html>
