<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disaggregated Multi-Cluster Layout — Option 1 &amp; 2 Examples</title>
    <style>
        body {
            background: #111;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 16px; }
        .toggle-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        .toggle-bar button {
            padding: 8px 20px;
            background: #1a1a1a;
            color: #888;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .toggle-bar button.active {
            background: #1a6fc4;
            color: #fff;
            border-color: #2a8ad4;
        }
        .toggle-bar button:hover:not(.active) { background: #2a2a2a; }
        #diagram { max-width: 100%; overflow-x: auto; }
        button.download {
            margin-top: 16px;
            padding: 10px 24px;
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button.download:hover { background: #2a2a2a; }
    </style>
</head>
<body>
    <h1>Disaggregated Azure Local — Multi-Cluster Layout Examples</h1>
    <p class="subtitle">2 Clusters × 4 Racks × 16 Nodes = 128 Nodes Total | FC SAN Storage | 2 Spines | Clos Leaf-Spine Fabric</p>

    <div class="toggle-bar">
        <button id="btn-opt1" class="active" onclick="showOption(1)">Option 1: Two-Row Grid (Full Detail)</button>
        <button id="btn-opt2" onclick="showOption(2)">Option 2: Condensed Rack View</button>
    </div>

    <div id="diagram"></div>
    <button class="download" onclick="downloadSvg()">Download Rack Diagram SVG</button>

<script>
(function () {
    'use strict';

    // ── Layout constants ──
    var TOTAL_U = 42;
    var RACK_W = 180;
    var U_H = 12;
    var POST_W = 6;
    var RACK_GAP = 30;
    var LABEL_FONT = 9;
    var LEGEND_FONT = 9;

    var C = {
        RACK_FRAME:  '#2a2a2a',
        RACK_RAIL:   '#3a3a3a',
        EMPTY_SLOT:  '#1a1a1a',
        SERVER:      '#aaaaaa',
        LEAF_SWITCH: '#444444',
        BMC_SWITCH:  '#e0e0e0',
        FC_SWITCH:   '#7c3aed',
        SAN_ARRAY:   '#6d28d9',
        SPINE:       '#1a6fc4',
        SERVICE_LEAF:'#0d9488',
        LABEL_LIGHT: '#ffffff',
        LABEL_DARK:  '#333333',
        BACKGROUND:  '#0a0a0a',
        CLUSTER1:    '#1a6fc4',
        CLUSTER2:    '#0d9488'
    };

    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Draw a rack frame ──
    function drawRackFrame(ox, oy, rackLabel, uH, rackW, postW) {
        uH = uH || U_H;
        rackW = rackW || RACK_W;
        postW = postW || POST_W;
        var innerH = TOTAL_U * uH;
        var outerW = rackW + postW * 2;
        var outerH = innerH + 12;
        var parts = [];
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + outerW + '" height="' + outerH + '" rx="3" fill="' + C.RACK_FRAME + '" stroke="#555" stroke-width="0.5"/>');
        parts.push('<rect x="' + (ox + postW) + '" y="' + (oy + 6) + '" width="' + rackW + '" height="' + innerH + '" fill="' + C.EMPTY_SLOT + '"/>');
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + postW + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        parts.push('<rect x="' + (ox + postW + rackW) + '" y="' + oy + '" width="' + postW + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        if (rackLabel) {
            parts.push('<text x="' + (ox + outerW / 2) + '" y="' + (oy - 6) + '" text-anchor="middle" font-size="' + (LABEL_FONT + 1) + '" font-weight="600" fill="#ccc" font-family="Segoe UI, sans-serif">' + esc(rackLabel) + '</text>');
        }
        return { svg: parts.join('\n'), outerW: outerW, outerH: outerH, innerH: innerH };
    }

    // ── Draw a device at a U position ──
    function drawDevice(ox, oy, uStart, heightU, color, label, labelColor, isLight, uH, rackW, postW) {
        uH = uH || U_H;
        rackW = rackW || RACK_W;
        postW = postW || POST_W;
        var innerH = TOTAL_U * uH;
        var deviceW = rackW - 4;
        var deviceH = heightU * uH - 2;
        var dx = ox + postW + 2;
        var dy = oy + 6 + innerH - uStart * uH - (heightU - 1) * uH + 1;
        var parts = [];
        parts.push('<rect x="' + dx + '" y="' + dy + '" width="' + deviceW + '" height="' + deviceH + '" rx="2" fill="' + color + '"/>');
        var panelOpacity = isLight ? '0.15' : '0.5';
        parts.push('<rect x="' + (dx + 3) + '" y="' + (dy + 1) + '" width="' + (deviceW - 6) + '" height="' + (deviceH - 2) + '" rx="1" fill="#0d0d0d" opacity="' + panelOpacity + '"/>');
        if (label) {
            var lc = labelColor || C.LABEL_LIGHT;
            var fs = Math.min(LABEL_FONT, deviceH * 0.7);
            var ly = dy + deviceH / 2 + fs * 0.35;
            parts.push('<text x="' + (dx + deviceW / 2) + '" y="' + ly + '" text-anchor="middle" font-size="' + fs + '" font-weight="500" fill="' + lc + '" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        return parts.join('\n');
    }

    // ── Draw a 1U switch with LEDs ──
    function drawSwitch(ox, oy, uStart, label, color, labelColor, isLight, uH, rackW, postW) {
        uH = uH || U_H;
        rackW = rackW || RACK_W;
        postW = postW || POST_W;
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 1, color, label, labelColor || C.LABEL_LIGHT, isLight, uH, rackW, postW));
        var innerH = TOTAL_U * uH;
        var dx = ox + postW + 2;
        var deviceW = rackW - 4;
        var dy = oy + 6 + innerH - uStart * uH + 1;
        var deviceH = uH - 2;
        var ledX = dx + deviceW - 14;
        var ledY = dy + deviceH / 2;
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (ledX + i * 4) + '" cy="' + ledY + '" r="1.2" fill="#00ff66" opacity="0.6"/>');
        }
        return parts.join('\n');
    }

    // ── Draw a 2U server node ──
    function drawServer(ox, oy, uStart, label, uH, rackW, postW) {
        uH = uH || U_H;
        rackW = rackW || RACK_W;
        postW = postW || POST_W;
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 2, C.SERVER, label, C.LABEL_LIGHT, false, uH, rackW, postW));
        var innerH = TOTAL_U * uH;
        var dx = ox + postW + 2;
        var dy = oy + 6 + innerH - uStart * uH - uH + 1;
        var deviceH = 2 * uH - 2;
        var deviceW = rackW - 4;
        // Drive bays
        var bayW = 6;
        var bayH = deviceH * 0.35;
        var bayY = dy + deviceH / 2 - bayH / 2;
        var bayStartX = dx + 6;
        for (var b = 0; b < 6; b++) {
            parts.push('<rect x="' + (bayStartX + b * (bayW + 1.5)) + '" y="' + bayY + '" width="' + bayW + '" height="' + bayH + '" rx="1" fill="#333" opacity="0.4"/>');
        }
        // LEDs
        var ledX = dx + deviceW - 12;
        var ledY = dy + 4;
        parts.push('<circle cx="' + ledX + '" cy="' + ledY + '" r="1.5" fill="#00ff66" opacity="0.7"/>');
        parts.push('<circle cx="' + (ledX + 5) + '" cy="' + ledY + '" r="1.5" fill="#3399ff" opacity="0.7"/>');
        return parts.join('\n');
    }

    // ── Draw a standalone box ──
    function drawStandaloneBox(x, y, w, h, color, strokeColor, label, sublabel) {
        var parts = [];
        parts.push('<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" rx="4" fill="' + color + '" stroke="' + strokeColor + '" stroke-width="0.5"/>');
        parts.push('<rect x="' + (x + 3) + '" y="' + (y + 2) + '" width="' + (w - 6) + '" height="' + (h - 4) + '" rx="2" fill="#0d0d0d" opacity="0.4"/>');
        if (label) {
            var ly = sublabel ? (y + h / 2 - 2) : (y + h / 2 + 4);
            parts.push('<text x="' + (x + w / 2) + '" y="' + ly + '" text-anchor="middle" font-size="9" font-weight="500" fill="#ffffff" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        if (sublabel) {
            parts.push('<text x="' + (x + w / 2) + '" y="' + (y + h / 2 + 9) + '" text-anchor="middle" font-size="7" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(sublabel) + '</text>');
        }
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (x + w - 12 + i * 5) + '" cy="' + (y + 7) + '" r="1.5" fill="#00ff66" opacity="0.7"/>');
        }
        return parts.join('\n');
    }

    // ── Draw legend ──
    function drawLegend(svgW, legendY, extraItems) {
        var parts = [];
        var legendItems = [
            { color: C.SERVER, label: 'Server Node' },
            { color: C.LEAF_SWITCH, label: 'Leaf Switch' },
            { color: C.BMC_SWITCH, label: 'BMC Switch' },
            { color: C.FC_SWITCH, label: 'FC Switch' },
            { color: C.SPINE, label: 'Spine Switch' },
            { color: C.SERVICE_LEAF, label: 'Service Leaf' },
            { color: C.SAN_ARRAY, label: 'SAN Storage' }
        ];
        if (extraItems) legendItems = legendItems.concat(extraItems);
        var swatchW = 12;
        var swatchH = 8;
        var itemGap = 12;
        var textWidthEstimate = function (s) { return s.length * 5; };
        var legendTotalW = 0;
        for (var li = 0; li < legendItems.length; li++) {
            legendTotalW += swatchW + 4 + textWidthEstimate(legendItems[li].label);
            if (li < legendItems.length - 1) legendTotalW += itemGap;
        }
        var legendX = (svgW - legendTotalW) / 2;
        for (var lj = 0; lj < legendItems.length; lj++) {
            var item = legendItems[lj];
            parts.push('<rect x="' + legendX + '" y="' + (legendY - swatchH / 2) + '" width="' + swatchW + '" height="' + swatchH + '" rx="2" fill="' + item.color + '" stroke="#555" stroke-width="0.5"/>');
            legendX += swatchW + 4;
            parts.push('<text x="' + legendX + '" y="' + (legendY + LEGEND_FONT * 0.35) + '" font-size="' + LEGEND_FONT + '" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(item.label) + '</text>');
            legendX += textWidthEstimate(item.label) + itemGap;
        }
        return parts.join('\n');
    }

    // ════════════════════════════════════════════════════════
    // OPTION 1: Two-Row Grid — Full Detail
    // ════════════════════════════════════════════════════════
    function generateOption1() {
        var racksPerRow = 4;
        var totalRacks = 8;
        var nodesPerRack = 16;
        var spineCount = 2;
        var rows = 2;

        var outerRackW = RACK_W + POST_W * 2;
        var innerH = TOTAL_U * U_H;
        var outerRackH = innerH + 12;

        var paddingX = 30;
        var titleH = 30;
        var spineH = 30;
        var spineGap = 14;
        var slH = 26;
        var slGap = 12;
        var rackLabelGap = 22;
        var rowGap = 50;
        var sanH = 40;
        var sanGap = 16;
        var legendH = 50;

        var totalRackWidth = racksPerRow * outerRackW + (racksPerRow - 1) * RACK_GAP;
        var svgW = totalRackWidth + paddingX * 2;

        var rackTopY1 = titleH + spineH + spineGap + slH + slGap + rackLabelGap;
        var rackTopY2 = rackTopY1 + outerRackH + rowGap + rackLabelGap;
        var svgH = rackTopY2 + outerRackH + sanGap + sanH + 10 + legendH;

        var parts = [];
        parts.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + svgW + ' ' + svgH + '" width="' + svgW + '" height="' + svgH + '" style="font-family: \'Segoe UI\', sans-serif;">');
        parts.push('<rect width="' + svgW + '" height="' + svgH + '" fill="' + C.BACKGROUND + '" rx="6"/>');
        parts.push('<text x="' + (svgW / 2) + '" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#ccc">Option 1: Two-Row Grid — Full Detail (2 Clusters × 64 Nodes)</text>');

        // ── Spines ──
        var spineY = titleH;
        var spineW = 180;
        var spineGapBetween = 30;
        var spineGroupW = spineCount * spineW + (spineCount - 1) * spineGapBetween;
        var spineStartX = (svgW - spineGroupW) / 2;
        for (var s = 0; s < spineCount; s++) {
            var sx = spineStartX + s * (spineW + spineGapBetween);
            parts.push(drawStandaloneBox(sx, spineY, spineW, spineH, C.SPINE, '#2a8ad4', 'Spine ' + (s + 1) + ' — N9K-9336C-FX2', 'ASN 64841'));
        }

        // ── Service Leaves ──
        var slY = spineY + spineH + spineGap;
        var slW = 150;
        var slGroupW = 2 * slW + 20;
        var slStartX = (svgW - slGroupW) / 2;
        parts.push(drawStandaloneBox(slStartX, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf A', 'ASN 65005'));
        parts.push(drawStandaloneBox(slStartX + slW + 20, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf B', 'ASN 65005'));

        // ── Cluster labels + rack rows ──
        var clusterLabels = ['Cluster 1 (Racks 1–4, 64 Nodes)', 'Cluster 2 (Racks 5–8, 64 Nodes)'];
        var clusterColors = [C.CLUSTER1, C.CLUSTER2];
        var rackTopYs = [rackTopY1, rackTopY2];

        var nodeGlobal = 0;
        var rackBaseASN = 64789;

        for (var row = 0; row < rows; row++) {
            var rackTopY = rackTopYs[row];
            var clusterColor = clusterColors[row];

            // Cluster label with colored accent line
            var clLabelY = rackTopY - rackLabelGap + 4;
            parts.push('<line x1="' + paddingX + '" y1="' + (clLabelY + 4) + '" x2="' + (paddingX + 50) + '" y2="' + (clLabelY + 4) + '" stroke="' + clusterColor + '" stroke-width="2"/>');
            parts.push('<text x="' + (paddingX + 56) + '" y="' + (clLabelY + 8) + '" font-size="11" font-weight="600" fill="' + clusterColor + '" font-family="Segoe UI, sans-serif">' + esc(clusterLabels[row]) + '</text>');

            for (var r = 0; r < racksPerRow; r++) {
                var globalRack = row * racksPerRow + r;
                var ox = paddingX + r * (outerRackW + RACK_GAP);
                var oy = rackTopY;
                var rackASN = rackBaseASN + globalRack;

                var frame = drawRackFrame(ox, oy, 'Rack ' + (globalRack + 1) + ' (ASN ' + rackASN + ')');
                parts.push(frame.svg);

                // Uplinks from spines
                var leafAX = ox + outerRackW * 0.35;
                var leafBX = ox + outerRackW * 0.65;
                var spineSrcY = (row === 0) ? (slY + slH) : (rackTopYs[0] + outerRackH + 12);
                for (var si = 0; si < spineCount; si++) {
                    var spineCX = spineStartX + si * (spineW + spineGapBetween) + spineW / 2;
                    parts.push('<line x1="' + spineCX + '" y1="' + spineSrcY + '" x2="' + leafAX + '" y2="' + oy + '" stroke="' + clusterColor + '" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>');
                    parts.push('<line x1="' + spineCX + '" y1="' + spineSrcY + '" x2="' + leafBX + '" y2="' + oy + '" stroke="' + clusterColor + '" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>');
                }

                // Devices inside rack
                var leafNum = globalRack * 2;
                parts.push(drawSwitch(ox, oy, 42, 'Leaf ' + (leafNum + 1) + 'A — 93180YC-FX3', C.LEAF_SWITCH));
                parts.push(drawSwitch(ox, oy, 41, 'Leaf ' + (leafNum + 2) + 'B — 93180YC-FX3', C.LEAF_SWITCH));
                parts.push(drawSwitch(ox, oy, 40, 'BMC ' + (globalRack + 1) + ' — 9348GC-FXP', C.BMC_SWITCH, C.LABEL_DARK, true));
                parts.push(drawSwitch(ox, oy, 2, 'FC Switch ' + (globalRack * 2 + 1) + 'A', C.FC_SWITCH));
                parts.push(drawSwitch(ox, oy, 1, 'FC Switch ' + (globalRack * 2 + 2) + 'B', C.FC_SWITCH));

                // Server nodes
                for (var n = 0; n < nodesPerRack; n++) {
                    var serverStartU = 39 - (n * 2);
                    if (serverStartU < 3) break;
                    nodeGlobal++;
                    parts.push(drawServer(ox, oy, serverStartU, 'Node ' + nodeGlobal));
                }
            }
        }

        // ── SAN Storage Arrays ──
        var sanY = rackTopY2 + outerRackH + sanGap;
        var sanW = (totalRackWidth - 30) / 2;
        var sanStartX = paddingX + 8;
        parts.push(drawStandaloneBox(sanStartX, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric A', 'FC 32G / All racks'));
        parts.push(drawStandaloneBox(sanStartX + sanW + 14, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric B', 'FC 32G / All racks'));

        // FC lines from both rows to SAN
        var sanAcx = sanStartX + sanW / 2;
        var sanBcx = sanStartX + sanW + 14 + sanW / 2;
        for (var row2 = 0; row2 < rows; row2++) {
            for (var r2 = 0; r2 < racksPerRow; r2++) {
                var rox = paddingX + r2 * (outerRackW + RACK_GAP);
                var rackBotY = rackTopYs[row2] + outerRackH;
                var fcAx = rox + outerRackW * 0.35;
                var fcBx = rox + outerRackW * 0.65;
                parts.push('<line x1="' + fcAx + '" y1="' + rackBotY + '" x2="' + sanAcx + '" y2="' + sanY + '" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>');
                parts.push('<line x1="' + fcBx + '" y1="' + rackBotY + '" x2="' + sanBcx + '" y2="' + sanY + '" stroke="#7c3aed" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>');
            }
        }

        // ── Legend ──
        var legendY = sanY + sanH + 20;
        parts.push(drawLegend(svgW, legendY));
        parts.push('<text x="' + (svgW / 2) + '" y="' + (legendY + 16) + '" text-anchor="middle" font-size="8" fill="#888">148U used / 336U total  |  128 nodes  |  8 racks (2 clusters)  |  2 spines  |  FC SAN</text>');

        parts.push('</svg>');
        return parts.join('\n');
    }

    // ════════════════════════════════════════════════════════
    // OPTION 2: Condensed Rack View — All 8 racks, single row
    // ════════════════════════════════════════════════════════
    function generateOption2() {
        var totalRacks = 8;
        var nodesPerRack = 16;
        var spineCount = 2;

        // Smaller dimensions for condensed view
        var cRackW = 130;
        var cPostW = 5;
        var cRackGap = 16;
        var cOuterRackW = cRackW + cPostW * 2;

        var paddingX = 20;
        var titleH = 30;
        var spineH = 28;
        var spineGap = 12;
        var slH = 24;
        var slGap = 10;
        var rackLabelGap = 22;
        var sanH = 36;
        var sanGap = 14;
        var legendH = 50;

        // Condensed rack: only show switches + a summary block for nodes
        var condensedRackH = 160;

        var totalRackWidth = totalRacks * cOuterRackW + (totalRacks - 1) * cRackGap;
        var svgW = totalRackWidth + paddingX * 2;
        var rackTopY = titleH + spineH + spineGap + slH + slGap + rackLabelGap;
        var svgH = rackTopY + condensedRackH + sanGap + sanH + 10 + legendH;

        var parts = [];
        parts.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + svgW + ' ' + svgH + '" width="' + svgW + '" height="' + svgH + '" style="font-family: \'Segoe UI\', sans-serif;">');
        parts.push('<rect width="' + svgW + '" height="' + svgH + '" fill="' + C.BACKGROUND + '" rx="6"/>');
        parts.push('<text x="' + (svgW / 2) + '" y="18" text-anchor="middle" font-size="12" font-weight="600" fill="#ccc">Option 2: Condensed Rack View — All 8 Racks, Single Row (2 Clusters × 64 Nodes)</text>');

        // ── Spines ──
        var spineY = titleH;
        var spineW = 150;
        var spineGapBetween = 24;
        var spineGroupW = spineCount * spineW + (spineCount - 1) * spineGapBetween;
        var spineStartX = (svgW - spineGroupW) / 2;
        for (var s = 0; s < spineCount; s++) {
            var sx = spineStartX + s * (spineW + spineGapBetween);
            parts.push(drawStandaloneBox(sx, spineY, spineW, spineH, C.SPINE, '#2a8ad4', 'Spine ' + (s + 1) + ' — N9K-9336C-FX2', 'ASN 64841'));
        }

        // ── Service Leaves ──
        var slY = spineY + spineH + spineGap;
        var slW = 130;
        var slGroupW = 2 * slW + 16;
        var slStartX = (svgW - slGroupW) / 2;
        parts.push(drawStandaloneBox(slStartX, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf A', 'ASN 65005'));
        parts.push(drawStandaloneBox(slStartX + slW + 16, slY, slW, slH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf B', 'ASN 65005'));

        // ── Cluster divider between rack 4 and 5 ──
        var dividerX = paddingX + 4 * (cOuterRackW + cRackGap) - cRackGap / 2;

        // ── Condensed Racks ──
        var rackBaseASN = 64789;
        for (var r = 0; r < totalRacks; r++) {
            var ox = paddingX + r * (cOuterRackW + cRackGap);
            var oy = rackTopY;
            var rackASN = rackBaseASN + r;
            var clusterNum = (r < 4) ? 1 : 2;
            var clusterColor = (r < 4) ? C.CLUSTER1 : C.CLUSTER2;

            // Rack frame (condensed)
            parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + cOuterRackW + '" height="' + condensedRackH + '" rx="3" fill="' + C.RACK_FRAME + '" stroke="' + clusterColor + '" stroke-width="0.8"/>');
            parts.push('<rect x="' + (ox + cPostW) + '" y="' + (oy + 5) + '" width="' + cRackW + '" height="' + (condensedRackH - 10) + '" fill="' + C.EMPTY_SLOT + '"/>');

            // Rack label
            parts.push('<text x="' + (ox + cOuterRackW / 2) + '" y="' + (oy - 6) + '" text-anchor="middle" font-size="9" font-weight="600" fill="' + clusterColor + '">Rack ' + (r + 1) + ' (ASN ' + rackASN + ')</text>');

            var deviceX = ox + cPostW + 2;
            var deviceW = cRackW - 4;
            var curY = oy + 8;
            var rowH = 14;

            // Leaf-A
            parts.push('<rect x="' + deviceX + '" y="' + curY + '" width="' + deviceW + '" height="' + rowH + '" rx="2" fill="' + C.LEAF_SWITCH + '"/>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + rowH / 2 + 3) + '" text-anchor="middle" font-size="7" fill="#fff">Leaf ' + (r * 2 + 1) + 'A</text>');
            curY += rowH + 2;

            // Leaf-B
            parts.push('<rect x="' + deviceX + '" y="' + curY + '" width="' + deviceW + '" height="' + rowH + '" rx="2" fill="' + C.LEAF_SWITCH + '"/>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + rowH / 2 + 3) + '" text-anchor="middle" font-size="7" fill="#fff">Leaf ' + (r * 2 + 2) + 'B</text>');
            curY += rowH + 2;

            // BMC
            parts.push('<rect x="' + deviceX + '" y="' + curY + '" width="' + deviceW + '" height="' + (rowH - 2) + '" rx="2" fill="' + C.BMC_SWITCH + '"/>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + (rowH - 2) / 2 + 3) + '" text-anchor="middle" font-size="7" fill="#333">BMC ' + (r + 1) + '</text>');
            curY += rowH + 4;

            // ── CONDENSED NODE BLOCK ──
            var nodeBlockH = 60;
            parts.push('<rect x="' + deviceX + '" y="' + curY + '" width="' + deviceW + '" height="' + nodeBlockH + '" rx="3" fill="' + C.SERVER + '" opacity="0.8"/>');
            parts.push('<rect x="' + (deviceX + 2) + '" y="' + (curY + 2) + '" width="' + (deviceW - 4) + '" height="' + (nodeBlockH - 4) + '" rx="2" fill="#0d0d0d" opacity="0.5"/>');
            // Node count
            var startNode = r * nodesPerRack + 1;
            var endNode = startNode + nodesPerRack - 1;
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + nodeBlockH / 2 - 6) + '" text-anchor="middle" font-size="16" font-weight="700" fill="#fff">' + nodesPerRack + '</text>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + nodeBlockH / 2 + 7) + '" text-anchor="middle" font-size="8" fill="#aaa">Server Nodes</text>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + nodeBlockH / 2 + 18) + '" text-anchor="middle" font-size="7" fill="#888">N' + startNode + ' – N' + endNode + '</text>');
            curY += nodeBlockH + 4;

            // FC Switches at bottom
            parts.push('<rect x="' + deviceX + '" y="' + curY + '" width="' + deviceW + '" height="' + rowH + '" rx="2" fill="' + C.FC_SWITCH + '"/>');
            parts.push('<text x="' + (deviceX + deviceW / 2) + '" y="' + (curY + rowH / 2 + 3) + '" text-anchor="middle" font-size="7" fill="#fff">FC ' + (r * 2 + 1) + 'A / ' + (r * 2 + 2) + 'B</text>');

            // ── Uplink lines ──
            var leafCX = ox + cOuterRackW / 2;
            for (var si = 0; si < spineCount; si++) {
                var spineCX = spineStartX + si * (spineW + spineGapBetween) + spineW / 2;
                parts.push('<line x1="' + spineCX + '" y1="' + (slY + slH) + '" x2="' + leafCX + '" y2="' + oy + '" stroke="' + clusterColor + '" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.3"/>');
            }
        }

        // ── Cluster divider ──
        parts.push('<line x1="' + dividerX + '" y1="' + (rackTopY - 16) + '" x2="' + dividerX + '" y2="' + (rackTopY + condensedRackH + 6) + '" stroke="#555" stroke-width="1" stroke-dasharray="6,4"/>');
        parts.push('<text x="' + (dividerX - 2) + '" y="' + (rackTopY - 20) + '" text-anchor="end" font-size="8" fill="' + C.CLUSTER1 + '">Cluster 1</text>');
        parts.push('<text x="' + (dividerX + 4) + '" y="' + (rackTopY - 20) + '" text-anchor="start" font-size="8" fill="' + C.CLUSTER2 + '">Cluster 2</text>');

        // ── SAN Storage ──
        var sanY = rackTopY + condensedRackH + sanGap;
        var sanW = (totalRackWidth - 20) / 2;
        var sanStartX = paddingX + 5;
        parts.push(drawStandaloneBox(sanStartX, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric A', 'FC 32G'));
        parts.push(drawStandaloneBox(sanStartX + sanW + 10, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric B', 'FC 32G'));

        // FC lines
        var sanAcx = sanStartX + sanW / 2;
        var sanBcx = sanStartX + sanW + 10 + sanW / 2;
        for (var r2 = 0; r2 < totalRacks; r2++) {
            var rox = paddingX + r2 * (cOuterRackW + cRackGap) + cOuterRackW / 2;
            parts.push('<line x1="' + rox + '" y1="' + (rackTopY + condensedRackH) + '" x2="' + sanAcx + '" y2="' + sanY + '" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.3"/>');
            parts.push('<line x1="' + rox + '" y1="' + (rackTopY + condensedRackH) + '" x2="' + sanBcx + '" y2="' + sanY + '" stroke="#7c3aed" stroke-width="0.6" stroke-dasharray="3,3" opacity="0.3"/>');
        }

        // ── Legend ──
        var legendY = sanY + sanH + 18;
        parts.push(drawLegend(svgW, legendY));
        parts.push('<text x="' + (svgW / 2) + '" y="' + (legendY + 16) + '" text-anchor="middle" font-size="8" fill="#888">128 nodes  |  8 racks (2 clusters × 4)  |  2 spines  |  FC SAN  |  Condensed View</text>');

        parts.push('</svg>');
        return parts.join('\n');
    }

    // ── Render + Toggle ──
    var currentOption = 1;

    function render(option) {
        currentOption = option;
        var svg = (option === 1) ? generateOption1() : generateOption2();
        document.getElementById('diagram').innerHTML = svg;
    }

    window.showOption = function (opt) {
        document.getElementById('btn-opt1').className = (opt === 1) ? 'active' : '';
        document.getElementById('btn-opt2').className = (opt === 2) ? 'active' : '';
        render(opt);
    };

    window.downloadSvg = function () {
        var svgEl = document.querySelector('#diagram svg');
        if (!svgEl) return;
        var blob = new Blob([svgEl.outerHTML], { type: 'image/svg+xml' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'disaggregated-multi-cluster-option' + currentOption + '.svg';
        a.click();
        URL.revokeObjectURL(url);
    };

    render(1);
})();
</script>
</body>
</html>
