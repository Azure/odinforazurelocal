<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disaggregated Rack Layout — 4 Racks × 16 Nodes, FC SAN</title>
    <style>
        body {
            background: #111;
            color: #ccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
        .subtitle { font-size: 13px; color: #888; margin-bottom: 20px; }
        #diagram { max-width: 100%; overflow-x: auto; }
        button {
            margin-top: 16px;
            padding: 10px 24px;
            background: #1a1a1a;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #2a2a2a; }
    </style>
</head>
<body>
    <h1>Disaggregated Azure Local — Rack Layout</h1>
    <p class="subtitle">4 Racks × 16 Nodes | FC SAN Storage | 2 Spines | Clos Leaf-Spine Fabric</p>
    <div id="diagram"></div>
    <button onclick="downloadSvg()">Download Rack Diagram SVG</button>

<script>
(function () {
    'use strict';

    // ── Layout constants (matching rack-svg.js) ──
    var TOTAL_U = 42;
    var RACK_W = 220;
    var U_H = 14;
    var POST_W = 8;
    var RACK_GAP = 40;
    var LABEL_FONT = 10;
    var LEGEND_FONT = 10;

    // ── Colors ──
    var C = {
        RACK_FRAME:  '#2a2a2a',
        RACK_RAIL:   '#3a3a3a',
        EMPTY_SLOT:  '#1a1a1a',
        SERVER:      '#aaaaaa',
        LEAF_SWITCH: '#444444',
        BMC_SWITCH:  '#e0e0e0',
        FC_SWITCH:   '#7c3aed',
        SAN_ARRAY:   '#6d28d9',
        SPINE:       '#1a6fc4',
        SERVICE_LEAF:'#0d9488',
        LABEL_LIGHT: '#ffffff',
        LABEL_DARK:  '#333333',
        BACKGROUND:  '#0a0a0a'
    };

    function esc(s) {
        return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Draw a rack frame ──
    function drawRackFrame(ox, oy, rackLabel) {
        var innerH = TOTAL_U * U_H;
        var outerW = RACK_W + POST_W * 2;
        var outerH = innerH + 12;
        var parts = [];
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + outerW + '" height="' + outerH + '" rx="3" fill="' + C.RACK_FRAME + '" stroke="#555" stroke-width="0.5"/>');
        parts.push('<rect x="' + (ox + POST_W) + '" y="' + (oy + 6) + '" width="' + RACK_W + '" height="' + innerH + '" fill="' + C.EMPTY_SLOT + '"/>');
        parts.push('<rect x="' + ox + '" y="' + oy + '" width="' + POST_W + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        parts.push('<rect x="' + (ox + POST_W + RACK_W) + '" y="' + oy + '" width="' + POST_W + '" height="' + outerH + '" rx="1" fill="' + C.RACK_RAIL + '"/>');
        for (var u = 5; u <= TOTAL_U; u += 5) {
            var markerY = oy + 6 + innerH - u * U_H + U_H / 2;
            parts.push('<text x="' + (ox + POST_W / 2) + '" y="' + (markerY + 3) + '" text-anchor="middle" font-size="6" fill="#888" font-family="Segoe UI, sans-serif">' + u + '</text>');
        }
        if (rackLabel) {
            parts.push('<text x="' + (ox + outerW / 2) + '" y="' + (oy - 6) + '" text-anchor="middle" font-size="' + (LABEL_FONT + 1) + '" font-weight="600" fill="#ccc" font-family="Segoe UI, sans-serif">' + esc(rackLabel) + '</text>');
        }
        return parts.join('\n');
    }

    // ── Draw a device at a U position ──
    function drawDevice(ox, oy, uStart, heightU, color, label, labelColor, isLight) {
        var innerH = TOTAL_U * U_H;
        var deviceW = RACK_W - 4;
        var deviceH = heightU * U_H - 2;
        var dx = ox + POST_W + 2;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var parts = [];
        parts.push('<rect x="' + dx + '" y="' + dy + '" width="' + deviceW + '" height="' + deviceH + '" rx="2" fill="' + color + '"/>');
        var panelOpacity = isLight ? '0.15' : '0.5';
        parts.push('<rect x="' + (dx + 3) + '" y="' + (dy + 1) + '" width="' + (deviceW - 6) + '" height="' + (deviceH - 2) + '" rx="1" fill="#0d0d0d" opacity="' + panelOpacity + '"/>');
        if (label) {
            var lc = labelColor || C.LABEL_LIGHT;
            var ly = dy + deviceH / 2 + LABEL_FONT * 0.35;
            parts.push('<text x="' + (dx + deviceW / 2) + '" y="' + ly + '" text-anchor="middle" font-size="' + LABEL_FONT + '" font-weight="500" fill="' + lc + '" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        return parts.join('\n');
    }

    // ── Draw a 1U switch with LEDs ──
    function drawSwitch(ox, oy, uStart, label, color, labelColor, isLight) {
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 1, color, labelColor || C.LABEL_LIGHT, isLight));
        // Rebuild the device properly - drawDevice takes (ox, oy, uStart, heightU, color, label, labelColor, isLight)
        // The above call was wrong, let me redo
        parts = [];
        parts.push(drawDevice(ox, oy, uStart, 1, color, label, labelColor || C.LABEL_LIGHT, isLight));
        var innerH = TOTAL_U * U_H;
        var dx = ox + POST_W + 2;
        var deviceW = RACK_W - 4;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var deviceH = U_H - 2;
        var ledX = dx + deviceW - 16;
        var ledY = dy + deviceH / 2;
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (ledX + i * 5) + '" cy="' + ledY + '" r="1.5" fill="#00ff66" opacity="0.6"/>');
        }
        return parts.join('\n');
    }

    // ── Draw a 2U server node ──
    function drawServer(ox, oy, uStart, label) {
        var parts = [];
        parts.push(drawDevice(ox, oy, uStart, 2, C.SERVER, label, C.LABEL_LIGHT));
        var innerH = TOTAL_U * U_H;
        var dx = ox + POST_W + 2;
        var dy = oy + 6 + innerH - uStart * U_H + 1;
        var deviceH = 2 * U_H - 2;
        // Drive bays
        var bayW = 8;
        var bayH = deviceH * 0.4;
        var bayY = dy + deviceH / 2 - bayH / 2;
        var bayStartX = dx + 8;
        for (var b = 0; b < 6; b++) {
            parts.push('<rect x="' + (bayStartX + b * (bayW + 2)) + '" y="' + bayY + '" width="' + bayW + '" height="' + bayH + '" rx="1" fill="#333" opacity="0.4"/>');
        }
        // Status LEDs
        var deviceW = RACK_W - 4;
        var ledX = dx + deviceW - 16;
        var ledY = dy + 5;
        parts.push('<circle cx="' + ledX + '" cy="' + ledY + '" r="2" fill="#00ff66" opacity="0.7"/>');
        parts.push('<circle cx="' + (ledX + 6) + '" cy="' + ledY + '" r="2" fill="#3399ff" opacity="0.7"/>');
        return parts.join('\n');
    }

    // ── Draw a standalone box (spine, service leaf, SAN) ──
    function drawStandaloneBox(x, y, w, h, color, strokeColor, label, sublabel) {
        var parts = [];
        parts.push('<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" rx="4" fill="' + color + '" stroke="' + strokeColor + '" stroke-width="0.5"/>');
        parts.push('<rect x="' + (x + 3) + '" y="' + (y + 2) + '" width="' + (w - 6) + '" height="' + (h - 4) + '" rx="2" fill="#0d0d0d" opacity="0.4"/>');
        if (label) {
            var ly = sublabel ? (y + h / 2 - 2) : (y + h / 2 + 4);
            parts.push('<text x="' + (x + w / 2) + '" y="' + ly + '" text-anchor="middle" font-size="10" font-weight="500" fill="#ffffff" font-family="Segoe UI, sans-serif">' + esc(label) + '</text>');
        }
        if (sublabel) {
            parts.push('<text x="' + (x + w / 2) + '" y="' + (y + h / 2 + 10) + '" text-anchor="middle" font-size="8" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(sublabel) + '</text>');
        }
        // LEDs
        for (var i = 0; i < 3; i++) {
            parts.push('<circle cx="' + (x + w - 14 + i * 6) + '" cy="' + (y + 8) + '" r="2" fill="#00ff66" opacity="0.7"/>');
        }
        return parts.join('\n');
    }

    // ── Main generator ──
    function generateDisaggregatedRackSvg() {
        var rackCount = 4;
        var nodesPerRack = 16;
        var spineCount = 2;

        var outerRackW = RACK_W + POST_W * 2; // 236
        var innerH = TOTAL_U * U_H;           // 588
        var outerRackH = innerH + 12;          // 600

        // Layout zones
        var paddingX = 30;
        var titleH = 30;
        var spineH = 36;
        var spineGap = 20;
        var servicLeafH = 30;
        var serviceLeafGap = 16;
        var rackLabelGap = 26;
        var sanH = 50;
        var sanGap = 20;
        var legendH = 60;
        var bottomPad = 16;

        var totalRackWidth = rackCount * outerRackW + (rackCount - 1) * RACK_GAP;
        var svgW = totalRackWidth + paddingX * 2;
        var rackTopY = titleH + spineH + spineGap + servicLeafH + serviceLeafGap + rackLabelGap;
        var svgH = rackTopY + outerRackH + sanGap + sanH + 10 + legendH + bottomPad;

        var parts = [];
        parts.push('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ' + svgW + ' ' + svgH + '" width="' + svgW + '" height="' + svgH + '" style="font-family: \'Segoe UI\', sans-serif;">');
        parts.push('<rect width="' + svgW + '" height="' + svgH + '" fill="' + C.BACKGROUND + '" rx="6"/>');

        // ── Title + Brand ──
        parts.push('<text x="' + (svgW / 2) + '" y="20" text-anchor="middle" font-size="13" font-weight="600" fill="#ccc" font-family="Segoe UI, sans-serif">Rack Layout — Front View (Disaggregated, FC SAN)</text>');

        var ICON_DATA_URI = 'data:image/svg+xml;base64,PHN2ZyB2aWV3Qm94PSIwIDAgMTI4IDEyOCIgY2xhc3M9IiIgcm9sZT0icHJlc2VudGF0aW9uIiBmb2N1c2FibGU9ImZhbHNlIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHhtbG5zOnhsaW5rPSJodHRwOi8vd3d3LnczLm9yZy8xOTk5L3hsaW5rIiBpZD0iRnhTeW1ib2wwLTEyMyIgZGF0YS10eXBlPSIxIj48Zz48dGl0bGU+PC90aXRsZT48cGF0aCBkPSJNMTI1LjI1IDEwNy41MTNjLTEuMTMgNC45NzgtNy4zMTcgOS44MjctMTguNDg4IDEzLjYyNWExNTIuNTcxIDE1Mi41NzEgMCAwIDEtODUuNzA0LjEyMWMtMTAuMzAzLTMuNjQ4LTE1Ljg2NC04LjI2My0xNi43MzItMTMuMDIxLS4xNS0uODM5IDAtMTMuODk1IDAtMTMuODk1bDEyMS4xNTktMS4xMjNzLS4wOTIgMTMuNjgxLS4yMzUgMTQuMjkzWiIgZmlsbD0iIzVFQTBFRiI+PC9wYXRoPjxwYXRoIGQ9Ik02NS4wNCAxMTUuMDMxYzMzLjQ3OS0uMzM2IDYwLjUyNS05Ljk5MSA2MC40MDktMjEuNTY0LS4xMTYtMTEuNTczLTI3LjM1LTIwLjY4My02MC44My0yMC4zNDctMzMuNDc5LjMzNi02MC41MjUgOS45OS02MC40MDkgMjEuNTY0LjExNiAxMS41NzMgMjcuMzUgMjAuNjgzIDYwLjgzIDIwLjM0N1oiIGZpbGw9IiM1MEU2RkYiPjwvcGF0aD48cGF0aCBkPSJNMTA1Ljk4OSAxMUgyMi4wMTFBMy4wMTEgMy4wMTEgMCAwIDAgMTkgMTQuMDExdjE4LjU4NWEzLjAxMSAzLjAxMSAwIDAgMCAzLjAxMSAzLjAxMWg4My45NzhhMy4wMTEgMy4wMTEgMCAwIDAgMy4wMTEtMy4wMVYxNC4wMWEzLjAxMSAzLjAxMSAwIDAgMC0zLjAxMS0zLjAxWiIgZmlsbD0iI0I1OTZGNSI+PC9wYXRoPjxwYXRoIGQ9Ik0xMDAuMjMgMTUuMzA3aC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MyAxLjUwMi0xLjUwM3YtMy43MmMwLS44My0uNjcyLTEuNTAzLTEuNTAyLTEuNTAzWm0wIDkuMjczaC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MyAxLjUwMi0xLjUwM3YtMy43MmMwLS44My0uNjcyLTEuNTAzLTEuNTAyLTEuNTAzWiIgZmlsbD0iI0YyRjJGMiI+PC9wYXRoPjxwYXRoIGQ9Ik0xMDUuOTg5IDQwLjE2NkgyMi4wMTFBMy4wMTEgMy4wMTEgMCAwIDAgMTkgNDMuMTc2djE4LjU4NmEzLjAxMSAzLjAxMSAwIDAgMCAzLjAxMSAzLjAxMWg4My45NzhhMy4wMTEgMy4wMTEgMCAwIDAgMy4wMTEtMy4wMVY0My4xNzZhMy4wMSAzLjAxIDAgMCAwLTMuMDExLTMuMDExWiIgZmlsbD0iIzkyNjZFNiI+PC9wYXRoPjxwYXRoIGQ9Ik0xMDAuMjMgNDQuNDY3aC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MyAxLjUwMi0xLjUwM3YtMy43MmMwLS44My0uNjcyLTEuNTAzLTEuNTAyLTEuNTAzWm0wIDkuMjczaC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MyAxLjUwMi0xLjUwMnYtMy43MmMwLS44My0uNjcyLTEuNTA0LTEuNTAyLTEuNTA0WiIgZmlsbD0iI0YyRjJGMiI+PC9wYXRoPjxwYXRoIGQ9Ik0xMDUuOTg5IDY5LjMyNkgyMi4wMTFBMy4wMTEgMy4wMTEgMCAwIDAgMTkgNzIuMzM2djE4LjU4NmEzLjAxMSAzLjAxMSAwIDAgMCAzLjAxMSAzLjAxMWg4My45NzhhMy4wMSAzLjAxIDAgMCAwIDMuMDExLTMuMDFWNzIuMzM2YTMuMDExIDMuMDExIDAgMCAwLTMuMDExLTMuMDExWiIgZmlsbD0iIzU1MkY5OSI+PC9wYXRoPjxwYXRoIGQ9Ik0xMDAuMjMgNzMuNjI3aC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MyAxLjUwMi0xLjUwMlY3NS4xM2MwLS44My0uNjcyLTEuNTAzLTEuNTAyLTEuNTAzWm0wIDkuMjczaC0zLjcyYy0uODMgMC0xLjUwNC42NzMtMS41MDQgMS41MDN2My43MmMwIC44My42NzMgMS41MDMgMS41MDMgMS41MDNoMy43MjFjLjgzIDAgMS41MDItLjY3MiAxLjUwMi0xLjUwMnYtMy43MmMwLS44My0uNjcyLTEuNTA0LTEuNTAyLTEuNTA0WiIgZmlsbD0iI0YyRjJGMiI+PC9wYXRoPjwvZz48ZGVmcz4KPC9kZWZzPgo8L3N2Zz4=';
        var brandX = svgW - 20;
        var brandY = 8;
        parts.push('<image href="' + ICON_DATA_URI + '" x="' + (brandX - 92) + '" y="' + brandY + '" width="20" height="20" opacity="0.85"/>');
        parts.push('<text x="' + (brandX - 68) + '" y="' + (brandY + 15) + '" font-size="12" font-weight="600" fill="#B596F5" font-family="Segoe UI, sans-serif">Azure Local</text>');

        // ── Spine switches ──
        var spineY = titleH;
        var spineW = 200;
        var spineGapBetween = 40;
        var spineGroupW = spineCount * spineW + (spineCount - 1) * spineGapBetween;
        var spineStartX = (svgW - spineGroupW) / 2;

        for (var s = 0; s < spineCount; s++) {
            var sx = spineStartX + s * (spineW + spineGapBetween);
            parts.push(drawStandaloneBox(sx, spineY, spineW, spineH, C.SPINE, '#2a8ad4', 'Spine ' + (s + 1), 'ASN 64841'));
        }

        // ── Service Leaf pair ──
        var slY = spineY + spineH + spineGap;
        var slW = 180;
        var slGapBetween = 30;
        var slGroupW = 2 * slW + slGapBetween;
        var slStartX = (svgW - slGroupW) / 2;

        parts.push(drawStandaloneBox(slStartX, slY, slW, servicLeafH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf A', 'ASN 65005'));
        parts.push(drawStandaloneBox(slStartX + slW + slGapBetween, slY, slW, servicLeafH, C.SERVICE_LEAF, '#14b8a6', 'Service Leaf B', 'ASN 65005'));

        // ── Dashed lines: Spines to Service Leaves ──
        var slMidY = slY;
        var spineBotY = spineY + spineH;
        // Each service leaf connects to each spine
        for (var si = 0; si < spineCount; si++) {
            var spineCX = spineStartX + si * (spineW + spineGapBetween) + spineW / 2;
            for (var sli = 0; sli < 2; sli++) {
                var slCX = slStartX + sli * (slW + slGapBetween) + slW / 2;
                parts.push('<line x1="' + spineCX + '" y1="' + spineBotY + '" x2="' + slCX + '" y2="' + slMidY + '" stroke="#5eead4" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            }
        }

        // ── Compute Racks ──
        var rackBaseASN = 64789;
        var nodeGlobal = 0;

        for (var r = 0; r < rackCount; r++) {
            var ox = paddingX + r * (outerRackW + RACK_GAP);
            var oy = rackTopY;
            var rackASN = rackBaseASN + r;

            parts.push(drawRackFrame(ox, oy, 'Rack ' + (r + 1) + ' (ASN ' + rackASN + ')'));

            // ── Dashed lines: Each spine to each leaf in this rack ──
            var rackCenterX = ox + outerRackW / 2;
            var leafAX = ox + outerRackW * 0.35;
            var leafBX = ox + outerRackW * 0.65;
            for (var si2 = 0; si2 < spineCount; si2++) {
                var spineCX2 = spineStartX + si2 * (spineW + spineGapBetween) + spineW / 2;
                parts.push('<line x1="' + spineCX2 + '" y1="' + (slY + servicLeafH) + '" x2="' + leafAX + '" y2="' + oy + '" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
                parts.push('<line x1="' + spineCX2 + '" y1="' + (slY + servicLeafH) + '" x2="' + leafBX + '" y2="' + oy + '" stroke="#7dd3fc" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            }

            // U42: Leaf-A
            parts.push(drawSwitch(ox, oy, 42, 'Leaf ' + (r + 1) + 'A', C.LEAF_SWITCH, C.LABEL_LIGHT));
            // U41: Leaf-B
            parts.push(drawSwitch(ox, oy, 41, 'Leaf ' + (r + 1) + 'B', C.LEAF_SWITCH, C.LABEL_LIGHT));
            // U40: BMC Switch
            parts.push(drawSwitch(ox, oy, 40, 'BMC ' + (r + 1), C.BMC_SWITCH, C.LABEL_DARK, true));

            // FC Switches at bottom of rack: U2 and U1
            parts.push(drawSwitch(ox, oy, 2, 'FC Switch ' + (r + 1) + 'A', C.FC_SWITCH, C.LABEL_LIGHT));
            parts.push(drawSwitch(ox, oy, 1, 'FC Switch ' + (r + 1) + 'B', C.FC_SWITCH, C.LABEL_LIGHT));

            // Server nodes: U39 down (2U each), 16 nodes → U39 to U8
            var topServerU = 39;
            for (var n = 0; n < nodesPerRack; n++) {
                var serverStartU = topServerU - (n * 2);
                if (serverStartU < 1) break;
                nodeGlobal++;
                parts.push(drawServer(ox, oy, serverStartU, 'Node ' + nodeGlobal));
            }
        }

        // ── SAN Storage Arrays (below racks) ──
        var sanY = rackTopY + outerRackH + sanGap;
        var sanW = (totalRackWidth - 40) / 2;
        var sanStartX = paddingX + 10;

        parts.push(drawStandaloneBox(sanStartX, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric A', 'FC 32G / Connected to FC Switch A in each rack'));
        parts.push(drawStandaloneBox(sanStartX + sanW + 20, sanY, sanW, sanH, C.SAN_ARRAY, '#7c3aed', 'SAN Storage Array — Fabric B', 'FC 32G / Connected to FC Switch B in each rack'));

        // ── Dashed lines: FC Switches (bottom of rack) to SAN ──
        var sanAcx = sanStartX + sanW / 2;
        var sanBcx = sanStartX + sanW + 20 + sanW / 2;
        for (var r2 = 0; r2 < rackCount; r2++) {
            var rox = paddingX + r2 * (outerRackW + RACK_GAP);
            var rackBotY = rackTopY + outerRackH;
            // FC switches are at U1-U2 inside the rack, connect from rack bottom
            var fcAx = rox + outerRackW * 0.35;
            var fcBx = rox + outerRackW * 0.65;
            parts.push('<line x1="' + fcAx + '" y1="' + rackBotY + '" x2="' + sanAcx + '" y2="' + sanY + '" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
            parts.push('<line x1="' + fcBx + '" y1="' + rackBotY + '" x2="' + sanBcx + '" y2="' + sanY + '" stroke="#c4b5fd" stroke-width="1.5" stroke-dasharray="6,3" opacity="0.25"/>');  
        }

        // ── Legend ──
        var legendY = sanY + sanH + 24;
        var legendItems = [
            { color: C.SERVER, label: 'Server Node' },
            { color: C.LEAF_SWITCH, label: 'Leaf Switch' },
            { color: C.BMC_SWITCH, label: 'BMC Switch', textColor: C.LABEL_DARK },
            { color: C.FC_SWITCH, label: 'FC Switch' },
            { color: C.SPINE, label: 'Spine Switch' },
            { color: C.SERVICE_LEAF, label: 'Service Leaf' },
            { color: C.SAN_ARRAY, label: 'SAN Storage' }
        ];

        var swatchW = 14;
        var swatchH = 10;
        var itemGap = 16;
        var textWidthEstimate = function (s) { return s.length * 6.2; };

        var legendTotalW = 0;
        for (var li = 0; li < legendItems.length; li++) {
            legendTotalW += swatchW + 4 + textWidthEstimate(legendItems[li].label);
            if (li < legendItems.length - 1) legendTotalW += itemGap;
        }

        var legendX = (svgW - legendTotalW) / 2;
        for (var lj = 0; lj < legendItems.length; lj++) {
            var item = legendItems[lj];
            parts.push('<rect x="' + legendX + '" y="' + (legendY - swatchH / 2) + '" width="' + swatchW + '" height="' + swatchH + '" rx="2" fill="' + item.color + '" stroke="#555" stroke-width="0.5"/>');
            legendX += swatchW + 4;
            parts.push('<text x="' + legendX + '" y="' + (legendY + LEGEND_FONT * 0.35) + '" font-size="' + LEGEND_FONT + '" fill="#aaa" font-family="Segoe UI, sans-serif">' + esc(item.label) + '</text>');
            legendX += textWidthEstimate(item.label) + itemGap;
        }

        // U count summary
        var switchesPerRack = 5; // 2 Leaf + 1 BMC + 2 FC
        var nodesU = rackCount * nodesPerRack * 2;
        var switchesU = rackCount * switchesPerRack;
        var usedU = nodesU + switchesU;
        var totalU = TOTAL_U * rackCount;
        parts.push('<text x="' + (svgW / 2) + '" y="' + (legendY + 18) + '" text-anchor="middle" font-size="9" fill="#888" font-family="Segoe UI, sans-serif">' + usedU + 'U used / ' + totalU + 'U total  |  ' + (rackCount * nodesPerRack) + ' nodes  |  ' + rackCount + ' racks  |  ' + spineCount + ' spines  |  FC SAN</text>');

        parts.push('</svg>');
        return parts.join('\n');
    }

    // ── Render ──
    var svg = generateDisaggregatedRackSvg();
    document.getElementById('diagram').innerHTML = svg;

    // ── Download ──
    window.downloadSvg = function () {
        var svgEl = document.querySelector('#diagram svg');
        var blob = new Blob([svgEl.outerHTML], { type: 'image/svg+xml' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = 'disaggregated-rack-layout-4rack-fc-san.svg';
        a.click();
        URL.revokeObjectURL(url);
    };
})();
</script>
</body>
</html>
