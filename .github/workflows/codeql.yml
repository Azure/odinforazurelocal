# CodeQL static analysis
# Runs GitHub's static analysis on PR + weekly to surface security and quality
# findings in the JavaScript code base. Findings appear under
# Security → Code scanning. Configured separately from the Test & Lint workflow
# so that PRs are not blocked by long CodeQL runs.

name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, Release]
  schedule:
    # Weekly scan: every Monday 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  analyze:
    name: CodeQL
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        language: [javascript]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-and-quality includes the standard 'security' suite plus
          # additional code-quality queries (matches what we want from the
          # earlier Copilot AI findings preview, but using SARIF / CodeQL rules).
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
